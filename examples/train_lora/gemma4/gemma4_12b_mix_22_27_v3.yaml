### model
model_name_or_path: ../hf_download/models/gemma4-12B-it
image_max_pixels: 65536    # 256x256; matches rollout image resolution
trust_remote_code: true
# flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: lora
freeze_vision_tower: true            # 只训语言侧；若 gemma4n 的 vision tower 名称不被识别会报错，见文末说明
freeze_multi_modal_projector: false

### LoRA
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all

### dataset
dataset: mix_22_27_v3_lite
template: gemma4n            # 12B = gemma4n（27B/26B 才用 gemma4）
enable_thinking: false      # 关闭 thinking：删除 CoT，思考段拼到 prompt 侧不计 loss
cutoff_len: 2048
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: saves/gemma4-12b/robot/mix_22_27_v3
logging_steps: 2
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb
run_name: gemma4-12b-robot-mix_22_27_v3

### train
# 3738 samples, 2 H200, batch=4, grad_acc=4 -> eff_bs=32 -> ~117 steps/epoch
# 30 epochs ≈ 3504 steps
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 30.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### distributed (ZeRO-2: 12B×bf16≈24GB fits in H200 141GB, less comm overhead)
deepspeed: examples/deepspeed/ds_z2_config.json
