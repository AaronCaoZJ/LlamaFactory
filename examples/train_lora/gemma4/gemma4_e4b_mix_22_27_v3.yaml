### model
model_name_or_path: ../hf_download/models/gemma4-E4B-it
image_max_pixels: 65536    # 256x256; matches rollout image resolution
trust_remote_code: true
# flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: lora
freeze_vision_tower: true            # E4B 的 model_type=gemma4 -> vision_tower + audio_tower 一起冻结
freeze_multi_modal_projector: false

### LoRA
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all

### dataset
dataset: mix_22_27_v3_lite
template: gemma4n            # E4B/12B = gemma4n（31B/26B 才用 gemma4）
enable_thinking: false      # 关闭 thinking：删除 CoT，思考段拼到 prompt 侧不计 loss
cutoff_len: 2048
overwrite_cache: true      # 图片被原地覆盖时 fingerprint 察觉不到（只 hash 路径字符串）；全量重算仅 ~17s
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: saves/gemma4-e4b/robot/mix_22_27_v3
logging_steps: 2
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb
run_name: gemma4-e4b-robot-mix_22_27_v3

### train
# 与 12B 配置保持同一超参（eff_bs=32、~117 steps/epoch、30 epochs ≈ 3504 steps）便于对比。
# E4B 权重 ~15GB（12B 为 ~23GB），显存宽裕，想提速可改 per_device=8 / grad_acc=2（eff_bs 不变）。
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 30.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### distributed (ZeRO-2)
deepspeed: examples/deepspeed/ds_z2_config.json
