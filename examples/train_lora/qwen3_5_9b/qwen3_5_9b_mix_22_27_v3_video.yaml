### model
# 对照实验：与 qwen3_5_9b_mix_22_27_v3.yaml 逐字段相同，唯一差别是两路相机走 video 槽位。
# 数据集 mix_22_27_v3_lite_video 是 mix_22_27_v3_lite 的 re-slot 版本（to_video_slot.py），
# 样本、顺序、prompt 完全一致，只是 <image><image> + images -> <video> + videos。
# Qwen 的 patch embed 是 3D conv（temporal_patch_size=2），两"帧"被融合成一组视觉 token：
# 每样本 64 个而不是 128 个，代价是 agentview / wrist 在每个空间位置被混合。详见 HANDOFF §2.5。
model_name_or_path: ../hf_download/models/Qwen3.5-9B
video_max_pixels: 65536    # 256x256，与 image 版的 image_max_pixels 对齐
video_min_pixels: 1024
video_fps: 2.0             # ⚠️ 决定 prompt 里的 "<0.2 seconds>" 时间戳文本；评测生成 mp4 必须用同一个 fps
video_maxlen: 128
trust_remote_code: true
# flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: lora
freeze_vision_tower: true
freeze_multi_modal_projector: false

### LoRA
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all

### dataset
dataset: mix_22_27_v3_lite_video
template: qwen3_5_nothink
cutoff_len: 2048
overwrite_cache: true      # 图片被原地覆盖时 fingerprint 察觉不到（只 hash 路径字符串）；全量重算仅 ~17s
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: saves/qwen3.5-9b/robot/mix_22_27_v3_video
logging_steps: 2
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb
run_name: qwen3.5-9b-robot-mix_22_27_v3_video

### train
# 4132 samples, 2 H200, batch=4, grad_acc=4 -> eff_bs=32 -> ~129 steps/epoch
# 30 epochs ≈ 3874 steps
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 30.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### distributed (ZeRO-2: 9B×bf16=18GB fits in H200 141GB, less comm overhead)
deepspeed: examples/deepspeed/ds_z2_config.json
