### model
model_name_or_path: ../hf_download/models/Qwen3.5-9B
video_max_pixels: 65536
video_min_pixels: 1024
video_fps: 2.0
video_maxlen: 64
image_max_pixels: 65536    # 256x256; matches rollout image resolution
trust_remote_code: true
# flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: lora
freeze_vision_tower: true
freeze_multi_modal_projector: false

### LoRA
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all

### dataset
dataset: mix_22-06_fk-pp_02_exchange_token_task_aug,robovqa_reasoning_lf_ans6k,robovqa_understanding_lf_500
media_dir: /storage/wenzheng/showrobot/hf_download/datasets/raw/RoboVQA
template: qwen3_5_nothink
cutoff_len: 4096
overwrite_cache: true      # 图片被原地覆盖时 fingerprint 察觉不到（只 hash 路径字符串）；全量重算仅 ~17s
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: saves/qwen3.5-9b/robot/mix_22-06_fk-pp/02_exchange_token_task_aug_plus_robovqa_clean_ans6k_under500_2_schedule
logging_steps: 2
save_steps: 1000
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb
run_name: qwen3.5-9b-robot-mix_22-06_fk-pp-02_exchange_token_task_aug-plus-robovqa-clean-ans6k-under500_2_shcedule

### train
# 14433 samples: 7933 manipulation task_aug + 6000 RoboVQA answer-only reasoning + 500 RoboVQA understanding.
# Reasoning targets and prompts are cleaned of <think>/<answer> tags.
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 40.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### distributed (ZeRO-2: 9B×bf16=18GB fits easily in H200 141GB, less comm overhead)
deepspeed: examples/deepspeed/ds_z0_config.json
