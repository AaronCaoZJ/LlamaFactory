### model
model_name_or_path: ../hf_download/models/Qwen3.5-9B
image_max_pixels: 65536    # 256x256; matches rollout image resolution (3 views -> ~192 vis tokens)
trust_remote_code: true
# flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: lora
freeze_vision_tower: true
freeze_multi_modal_projector: false

### LoRA
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all

### dataset
# CHAIN: one image forward, two answers. ShareGPT sample (2182) with TWO assistant turns --
# the LEFT token, a short follow-up user turn, then the RIGHT token. Same sequential
# conditioning as twice (right sees left) at once's image cost.
# The dataset is registered with formatting=sharegpt + columns.messages (NOT the Alpaca columns).
# mask_history stays false (the default) so BOTH assistant turns are supervised -- flipping it
# to true would train only the RIGHT token and silently drop half the labels.
dataset: dual_cloth_v4_chain
mask_history: false
template: qwen3_5_nothink
cutoff_len: 2048
overwrite_cache: true      # 图片被原地覆盖时 fingerprint 察觉不到（只 hash 路径字符串）
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: saves/qwen3.5-9b/robot/dual_cloth/chain
logging_steps: 2
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb
run_name: qwen3.5-9b-robot-dual_cloth-chain

### train
# 2182 samples (26 rollouts x ~84 steps), 1 H200 (single card), batch=4, grad_acc=8
# -> eff_bs=32 -> ~68 steps/epoch. 20 epochs ≈ 1365 steps.
# Same sample count as once; each sample supervises both arm tokens (across its 2 assistant turns).
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 20.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### distributed (ZeRO-2: 9B×bf16=18GB fits easily in H200 141GB, less comm overhead)
deepspeed: examples/deepspeed/ds_z2_config.json
