### model
model_name_or_path: ../hf_download/models/Qwen3.5-9B
image_max_pixels: 65536    # 256x256; matches rollout image resolution (3 views -> ~192 vis tokens)
trust_remote_code: true
# flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: lora
freeze_vision_tower: true
freeze_multi_modal_projector: false

### LoRA
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all

### dataset
# ONCE: one VLM call per step -> 1 Alpaca sample (2182) whose output is "<left> <right>".
# The right token is conditioned on the left one through the decoder's own autoregression,
# at the cost of a single image forward. Cheapest of the three at inference.
dataset: dual_cloth_v4_once
template: qwen3_5_nothink
cutoff_len: 2048
overwrite_cache: true      # 图片被原地覆盖时 fingerprint 察觉不到（只 hash 路径字符串）
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: saves/qwen3.5-9b/robot/dual_cloth/once
logging_steps: 2
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb
run_name: qwen3.5-9b-robot-dual_cloth-once

### train
# 2182 samples (26 rollouts x ~84 steps), 1 H200 (single card), batch=4, grad_acc=8
# -> eff_bs=32 -> ~68 steps/epoch. 20 epochs ≈ 1365 steps.
# Half the steps of twice, but each sample supervises BOTH arm tokens -- same signal per epoch.
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 20.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### distributed (ZeRO-2: 9B×bf16=18GB fits easily in H200 141GB, less comm overhead)
deepspeed: examples/deepspeed/ds_z2_config.json
