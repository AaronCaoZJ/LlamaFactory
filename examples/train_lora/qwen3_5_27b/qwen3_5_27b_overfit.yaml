### model
model_name_or_path: ../hf_download/models/Qwen3.5-27B
image_max_pixels: 262144
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
freeze_vision_tower: true
freeze_multi_modal_projector: true

### LoRA
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.0   # disable dropout for overfitting test
lora_target: all

### dataset
dataset: overfit
template: qwen3_5_nothink
cutoff_len: 512
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: saves/qwen3.5-27b/robot/overfit
logging_steps: 1
save_steps: 50
plot_loss: true
overwrite_output_dir: true
report_to: wandb
run_name: qwen3.5-27b-robot-overfit

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 1.0e-4   # higher LR to overfit faster
num_train_epochs: 30
lr_scheduler_type: constant  # no decay, we want to overfit
bf16: true
ddp_timeout: 180000000

### distributed
deepspeed: examples/deepspeed/ds_z3_config.json
