### model
model_name_or_path: OpenGVLab/InternVL3_5-2B-HF
image_max_pixels: 65536    # 256x256; matches the Qwen reproduction config
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
freeze_vision_tower: true
freeze_multi_modal_projector: false

### LoRA
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all

### dataset
# ManiSkill BlockPAP real2sim, 100 episodes / 5338 pairs, fully randomised block + coaster
# layout. Every MV_* token is one 2 cm single-axis end-effector move (closed-loop generated,
# measured 19.58 +- 0.41 mm, 0% diagonal steps). Images are the deployment pair:
# agentview = BlockPAP's calibrated front RealSense, wrist = centred hand camera already
# flipped the way run_maniskill_mvtoken.py sends it.
# Data/generator: LlamaFactory/data/agentrobot/MVTOKEN/ms_0717/ (see its README).
dataset: ms0717_blockpap_oracle_wide
template: intern_vl
cutoff_len: 2048
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: saves/internvl3.5-2b/robot/ms0717_blockpap_oracle_wide
logging_steps: 2
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb
project: llamafactory
# Must be a TEAM entity, not the organization: "aaroncaozj_showlab" is the org and W&B
# rejects it at wandb.init ("you may not log runs directly to your organization"), which
# kills the run right after "Total optimization steps". Valid entities for this login:
# aaron_cao (personal), aaroncaozj_team, lovashi514-nus.
wandb_entity: aaroncaozj_team
run_name: internvl3.5-2b-robot-ms0717_blockpap_oracle_wide

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 30.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
max_grad_norm: 1.0
bf16: true
ddp_timeout: 180000000

### distributed
deepspeed: examples/deepspeed/ds_z2_config.json
