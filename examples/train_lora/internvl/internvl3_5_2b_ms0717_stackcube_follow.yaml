### model
model_name_or_path: OpenGVLab/InternVL3_5-2B-HF
image_max_pixels: 65536    # 256x256; matches the Qwen reproduction config
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
freeze_vision_tower: true
freeze_multi_modal_projector: false

### LoRA
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all

### dataset
# ManiSkill's OFFICIAL StackCube-v1 (stack the red cube on the green one), 100 episodes,
# with the cameras swapped to BlockPAP's rig -- agentview extrinsics/intrinsics and the
# wrist mount pose are byte-identical to BlockPAP (verified numerically), so the two
# datasets are directly mixable. Both cubes are randomised natively by the task (position
# + yaw). Built with 方案 D (closed-loop follower), success-validated per episode.
# Data/generator: LlamaFactory/data/agentrobot/MVTOKEN/ms_0717/ (see its README).
dataset: ms0717_stackcube_follow
template: intern_vl
cutoff_len: 2048
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: saves/internvl3.5-2b/robot/ms0717_stackcube_follow
logging_steps: 2
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb
project: llamafactory
wandb_entity: aaroncaozj_team
run_name: internvl3.5-2b-robot-ms0717_stackcube_follow

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 40.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
max_grad_norm: 1.0
bf16: true
ddp_timeout: 180000000

### distributed
deepspeed: examples/deepspeed/ds_z2_config.json
