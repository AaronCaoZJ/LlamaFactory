### model
model_name_or_path: /workspace1/zhijun/hf_download/models/Qwen3.5-2B
image_max_pixels: 262144    # 512x512 cap; raise/lower to trade accuracy vs. memory
trust_remote_code: true
flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: full            # 全参数微调
freeze_vision_tower: false       # 全参数 -> also tune the vision tower (set true to save memory)
freeze_multi_modal_projector: false

### dataset
dataset: mikomiko_tag_train
# two complementary test sets (combined into one eval_loss during training; run separate
# eval afterward for per-set metrics): unseen posts + tag-frequency stratified
eval_dataset: mikomiko_tag_test_unseen,mikomiko_tag_test_stratified
template: qwen3_5_nothink
cutoff_len: 1024
preprocessing_num_workers: 32
dataloader_num_workers: 16

### output
output_dir: saves/qwen3.5-2b/mikomiko/pornstar-2k
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb
run_name: qwen3.5-2b-mikomiko-pornstar-2k

### train
per_device_train_batch_size: 32
gradient_accumulation_steps: 1
learning_rate: 1.0e-5            # full finetune -> smaller LR than LoRA
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000

### eval
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 50

### distributed (ZeRO-0 for full-parameter finetuning)
deepspeed: examples/deepspeed/ds_z0_config.json
